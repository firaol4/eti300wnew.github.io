<!DOCTYPE html> 
<html> 
<head> 
    <meta charset="UTF-8">
    <title>Matching Page</title>    
    <link rel="stylesheet" href="styles.css">
</head>      

<body>

    <header class="site-header">
        <div class="header-inner"></div>

        <div class="logo-area">
            <h1>
                <a href="index.html">
                    <img src="/images/zillow-logo.png" class="logo" alt="Zillow Logo"> 
                </a>
            </h1>
        </div> 
    </header>

    <main class="matching-main">
        <h1 class="matching-title">Your Home Matches</h1>

        <div class="swipe-container">
            <div id="swipe-card" class="card">
                <img id="home-image" src="" alt="Home">

                <h2 id="home-address"></h2>
                <p id="home-price"></p>
            </div>

            <div class="buttons">
                <button id="dislike-btn">❌</button>
                <button id="like-btn">❤️</button>
            </div>
        </div>
    </main>

    <!-- ⭐ THIS is where your script belongs -->
    <script src="swipe.js"></script>

</body>
</html>
